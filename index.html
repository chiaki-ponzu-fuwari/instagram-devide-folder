<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DM管理">
  <meta name="theme-color" content="#E1306C">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'">
  <title>Instagram DM管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    /* ===== BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F2F2F7;
      --bg2:       #FFFFFF;
      --bg3:       #F2F2F7;
      --card:      #FFFFFF;
      --txt:       #000000;
      --txt2:      rgba(60,60,67,.85);
      --txt3:      rgba(60,60,67,.55);
      --sep:       rgba(60,60,67,.22);
      --fill:      rgba(116,116,128,.10);
      --accent:    #E1306C;
      --ig-grad:   linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      --sidebar-w: 270px;
      --hdr-h:     56px;
      --st:        env(safe-area-inset-top,    0px);
      --sb:        env(safe-area-inset-bottom, 0px);
      --sl:        env(safe-area-inset-left,   0px);
      --sr:        env(safe-area-inset-right,  0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:   #000;
        --bg2:  #1C1C1E;
        --bg3:  #2C2C2E;
        --card: #1C1C1E;
        --txt:  #FFF;
        --txt2: rgba(235,235,245,.85);
        --txt3: rgba(235,235,245,.50);
        --sep:  rgba(84,84,88,.55);
        --fill: rgba(116,116,128,.18);
      }
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    /* ===== APP SHELL ===== */
    #app { display:flex; flex-direction:column; height:100%; padding-top:var(--st); }

    /* ===== HEADER ===== */
    .hdr {
      display:flex; align-items:center; gap:4px;
      height:var(--hdr-h); padding:0 8px 0 4px;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:.5px solid var(--sep);
      position:relative; z-index:20; flex-shrink:0;
    }
    @media (prefers-color-scheme:dark) {
      .hdr { background:rgba(28,28,30,.88); }
    }
    .hdr-title {
      flex:1; font-size:17px; font-weight:600; text-align:center;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .ico-btn {
      min-width:44px; height:44px; padding:0 6px;
      display:flex; align-items:center; justify-content:center;
      border:none; background:none; color:var(--accent);
      font-size:20px; cursor:pointer; border-radius:10px;
    }
    .ico-btn:active { background:var(--fill); }
    .ico-btn svg { width:22px; height:22px; fill:none; stroke:var(--accent); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    /* ===== BODY AREA ===== */
    .body { display:flex; flex:1; overflow:hidden; position:relative; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width:var(--sidebar-w); background:var(--bg2);
      border-right:.5px solid var(--sep);
      display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
      transition:transform .3s cubic-bezier(.25,.46,.45,.94);
    }
    @media (max-width:768px) {
      .sidebar {
        position:absolute; left:0; top:0; bottom:0; z-index:100;
        transform:translateX(-100%);
      }
      .sidebar.open {
        transform:translateX(0);
        box-shadow:6px 0 24px rgba(0,0,0,.25);
      }
    }
    .sidebar-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px 10px;
      border-bottom:.5px solid var(--sep); flex-shrink:0;
    }
    .sidebar-label { font-size:12px; font-weight:700; color:var(--txt3); text-transform:uppercase; letter-spacing:.8px; }
    .sidebar-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:6px 0 40px; }

    /* Folder rows */
    .f-row {
      display:flex; align-items:center; gap:8px;
      padding:9px 14px; cursor:pointer;
      transition:background .1s; min-height:44px; position:relative;
    }
    .f-row:active, .f-row.sel { background:rgba(225,48,108,.10); }
    .f-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .f-name { flex:1; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .f-row.sel .f-name { color:var(--accent); font-weight:600; }
    .f-cnt {
      font-size:12px; color:var(--txt3); background:var(--bg3);
      padding:1px 7px; border-radius:10px; min-width:20px; text-align:center;
    }
    .f-chev {
      font-size:18px; color:var(--txt3); transition:transform .2s;
      flex-shrink:0; width:44px; height:44px;
      display:flex; align-items:center; justify-content:center;
      border-radius:10px; margin-right:-8px;
      transform:rotate(90deg);
    }
    .f-chev:active { background:var(--fill); }
    .f-chev.coll { transform:rotate(0deg); }
    .f-row.d1 { padding-left:30px; }
    .f-row.d2 { padding-left:46px; }
    .f-row.d3 { padding-left:62px; }

    /* Overlay */
    .overlay {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,.42); z-index:99;
      transition:opacity .25s;
    }
    .overlay.show { display:block; }

    /* ===== MAIN ===== */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }

    /* Search */
    .srch-wrap {
      padding:8px 14px; background:var(--bg2);
      border-bottom:.5px solid var(--sep); flex-shrink:0;
    }
    .srch-inner {
      display:flex; align-items:center; gap:8px;
      background:var(--fill); border-radius:10px; padding:7px 10px;
    }
    .srch-ico { font-size:14px; color:var(--txt3); flex-shrink:0; }
    .srch-input {
      flex:1; border:none; background:none; font-size:15px;
      color:var(--txt); outline:none; -webkit-appearance:none;
      font-family:inherit;
    }
    .srch-input::placeholder { color:var(--txt3); }
    .srch-clr { font-size:13px; color:var(--txt3); cursor:pointer; display:none; padding:2px 4px; }
    .srch-clr.vis { display:block; }

    /* Info bar */
    .info-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 16px; flex-shrink:0;
    }
    .info-bar-name { font-size:16px; color:var(--txt); font-weight:700; }
    .info-bar-cnt  { font-size:13px; color:var(--txt3); }

    /* Account list */
    .acc-list { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 14px calc(90px + var(--sb)); }

    .sec-hdr {
      font-size:11px; font-weight:700; color:var(--txt3);
      text-transform:uppercase; letter-spacing:.8px; padding:14px 2px 6px;
    }

    /* Empty states */
    .empty {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:60px 20px; color:var(--txt3); text-align:center; gap:8px;
    }
    .empty-ico { font-size:52px; }
    .empty-ttl { font-size:17px; font-weight:600; color:var(--txt2); }
    .empty-sub { font-size:14px; }

    /* ===== ACCOUNT CARD ===== */
    .acc-card {
      background:var(--card); border-radius:14px;
      margin-bottom:8px; overflow:hidden;
      transition:transform .1s;
    }
    .acc-card:active { transform:scale(.985); }

    .acc-main {
      display:flex; align-items:center; gap:12px;
      padding:12px 14px; cursor:pointer;
    }
    .acc-avatar {
      width:46px; height:46px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:19px; font-weight:700; flex-shrink:0; color:#fff;
    }
    .acc-info { flex:1; min-width:0; }
    .acc-user {
      font-size:15px; font-weight:600; color:var(--txt);
      display:flex; align-items:center; gap:6px;
      overflow:hidden; white-space:nowrap;
    }
    .acc-user span { overflow:hidden; text-overflow:ellipsis; }
    .new-badge {
      background:var(--accent); color:#fff;
      font-size:9px; font-weight:800; padding:2px 6px;
      border-radius:6px; letter-spacing:.6px; flex-shrink:0;
    }
    .acc-sub {
      font-size:13px; color:var(--txt3);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px;
    }
    .acc-more {
      height:30px; padding:0 10px; display:flex; align-items:center;
      justify-content:center; border:none; cursor:pointer;
      font-size:12px; font-weight:700; border-radius:8px;
      color:var(--accent); background:rgba(225,48,108,.10); flex-shrink:0;
    }
    .acc-more:active { background:rgba(225,48,108,.22); }

    /* Expanded detail */
    .acc-detail {
      display:none; border-top:.5px solid var(--sep); padding:10px 14px 14px;
    }
    .acc-detail.open { display:block; }
    .d-row {
      display:flex; align-items:flex-start; gap:10px;
      padding:8px 0; border-bottom:.5px solid var(--sep);
    }
    .d-row:last-of-type { border-bottom:none; }
    .d-lbl { font-size:12px; color:var(--txt3); min-width:52px; padding-top:1px; flex-shrink:0; }
    .d-val { font-size:14px; color:var(--txt); flex:1; word-break:break-all; line-height:1.5; }
    .d-link { color:var(--accent); text-decoration:none; }

    .d-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .d-btn {
      padding:10px 6px; border-radius:10px; border:none;
      font-size:13px; font-weight:600; cursor:pointer; text-align:center;
      -webkit-tap-highlight-color:transparent;
    }
    .d-btn:active { opacity:.7; }
    .btn-edit   { background:var(--fill);                     color:var(--txt); }
    .btn-new    { background:rgba(225,48,108,.12);             color:var(--accent); }
    .btn-new.on { background:var(--accent);                   color:#fff; }
    .btn-move   { background:rgba(10,132,255,.12);             color:#0A84FF; }
    .btn-del    { background:rgba(255,59,48,.12);              color:#FF3B30; }

    /* ===== FAB ===== */
    .fab {
      position:fixed; right:calc(18px + var(--sr)); bottom:calc(22px + var(--sb));
      width:58px; height:58px; border-radius:50%;
      background:var(--ig-grad); color:#fff; font-size:30px;
      border:none; cursor:pointer; box-shadow:0 4px 22px rgba(225,48,108,.45);
      display:none; align-items:center; justify-content:center;
      z-index:50; transition:transform .1s, box-shadow .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .fab:active { transform:scale(.88); box-shadow:0 2px 10px rgba(225,48,108,.3); }

    /* ===== MODALS (bottom sheet) ===== */
    .modal-ov {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      z-index:300; display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity .22s;
    }
    .modal-ov.show { opacity:1; pointer-events:all; }
    .modal-sheet {
      width:100%; background:var(--bg2);
      border-radius:20px 20px 0 0;
      padding:0;
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.25,.46,.45,.94);
      max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    }
    .modal-ov.show .modal-sheet { transform:translateY(0); }
    .modal-handle { width:36px; height:4px; background:var(--sep); border-radius:2px; margin:10px auto 14px; }
    .modal-ttl {
      font-size:17px; font-weight:700; text-align:center;
      padding:0 16px 14px; border-bottom:.5px solid var(--sep);
    }
    .modal-body { padding:16px; }

    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:13px; font-weight:600; color:var(--txt2); margin-bottom:6px; }
    .fi {
      width:100%; padding:12px; border:.5px solid var(--sep);
      border-radius:10px; background:var(--bg3); color:var(--txt);
      font-size:15px; outline:none; -webkit-appearance:none; font-family:inherit;
    }
    .fi:focus { border-color:var(--accent); }
    .fi-ta { resize:none; min-height:80px; }

    /* Color picker */
    .cpick { display:flex; gap:10px; flex-wrap:wrap; }
    .c-opt {
      width:34px; height:34px; border-radius:50%; cursor:pointer;
      border:2.5px solid transparent; transition:transform .1s, border-color .1s;
    }
    .c-opt.sel { border-color:var(--txt); transform:scale(1.18); }

    .modal-actions {
      display:flex; gap:10px; padding:14px 16px calc(16px + var(--sb));
      position:sticky; bottom:0;
      background:var(--bg2);
      border-top:.5px solid var(--sep);
    }
    .btn-row { flex:1; padding:13px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; }
    .btn-row:active { opacity:.7; }
    .btn-cancel  { background:var(--fill); color:var(--txt); }
    .btn-primary { background:var(--ig-grad); color:#fff; }

    /* Folder picker (move modal) */
    .fpick-list { max-height:52vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .fp-item {
      display:flex; align-items:center; gap:12px;
      padding:13px 16px; cursor:pointer;
      border-bottom:.5px solid var(--sep); min-height:44px;
    }
    .fp-item:last-child { border-bottom:none; }
    .fp-item:active { background:var(--fill); }
    .fp-item.sel { background:rgba(225,48,108,.08); }
    .fp-name { flex:1; font-size:15px; }
    .fp-check { color:var(--accent); font-size:16px; }

    /* ===== ACTION SHEET ===== */
    .as-ov {
      position:fixed; inset:0; background:rgba(0,0,0,.42);
      z-index:400; display:flex; align-items:flex-end;
      padding:0 8px calc(8px + var(--sb));
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .as-ov.show { opacity:1; pointer-events:all; }
    .as-wrap { width:100%; transform:translateY(20px); transition:transform .25s cubic-bezier(.25,.46,.45,.94); }
    .as-ov.show .as-wrap { transform:translateY(0); }
    .as-group { background:var(--bg2); border-radius:14px; overflow:hidden; margin-bottom:8px; }
    .as-ttl {
      font-size:13px; color:var(--txt3); text-align:center;
      padding:12px 16px 10px; border-bottom:.5px solid var(--sep);
    }
    .as-item {
      display:flex; align-items:center; justify-content:center;
      padding:14px 16px; font-size:17px; color:var(--txt);
      cursor:pointer; border-top:.5px solid var(--sep); min-height:44px;
    }
    .as-item:first-child { border-top:none; }
    .as-item:active { background:var(--fill); }
    .as-item.danger { color:#FF3B30; }
    .as-cancel {
      background:var(--bg2); border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      padding:14px; font-size:17px; font-weight:700; color:var(--txt);
      cursor:pointer;
    }
    .as-cancel:active { background:var(--bg3); }

    /* ===== TOAST ===== */
    .toast {
      position:fixed; bottom:calc(88px + var(--sb)); left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,.82); color:#fff;
      padding:10px 20px; border-radius:20px;
      font-size:14px; z-index:999; white-space:nowrap;
      pointer-events:none; opacity:0; transition:opacity .3s;
    }
    @media (prefers-color-scheme:dark) { .toast { background:rgba(72,72,74,.96); } }
    .toast.show { opacity:1; }

    /* ===== DESKTOP OVERRIDE ===== */
    @media (min-width:769px) {
      .sidebar { transform:none !important; box-shadow:none; }
      .ham { display:none !important; }
    }

    /* ===== SETTINGS & TEMPLATES ===== */
    .settings-ov {
      position:fixed; inset:0; z-index:200;
      background:var(--bg); display:flex; flex-direction:column;
      padding-top:var(--st);
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.25,.46,.45,.94);
    }
    .settings-ov.show { transform:translateY(0); }
    .settings-hdr {
      display:flex; align-items:center; gap:4px;
      height:var(--hdr-h); padding:0 8px;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:.5px solid var(--sep); flex-shrink:0;
    }
    @media (prefers-color-scheme:dark) { .settings-hdr { background:rgba(28,28,30,.88); } }
    .settings-body {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:20px 14px calc(40px + var(--sb));
    }
    .settings-section-ttl {
      font-size:12px; font-weight:700; color:var(--txt3);
      text-transform:uppercase; letter-spacing:.8px;
      padding:0 2px 10px;
    }
    .tmpl-card {
      background:var(--card); border-radius:14px;
      margin-bottom:10px; overflow:hidden; transition:transform .1s;
    }
    .tmpl-card:active { transform:scale(.985); }
    .tmpl-row {
      display:flex; align-items:center; gap:10px;
      padding:14px 16px; cursor:pointer; min-height:48px;
    }
    .tmpl-title { flex:1; font-size:15px; font-weight:600; }
    .tmpl-chev { color:var(--txt3); font-size:18px; transition:transform .2s; }
    .tmpl-chev.open { transform:rotate(90deg); }
    .tmpl-detail {
      display:none; border-top:.5px solid var(--sep);
      padding:12px 14px 14px;
    }
    .tmpl-detail.open { display:block; }
    .tmpl-body {
      font-size:14px; color:var(--txt2); line-height:1.6;
      white-space:pre-wrap; word-break:break-all; margin-bottom:12px;
    }
    .tmpl-btns { display:flex; gap:8px; }
    .tmpl-btn {
      flex:1; padding:9px 4px; border-radius:8px; border:none;
      font-size:13px; font-weight:600; cursor:pointer; text-align:center;
    }
    .tmpl-btn:active { opacity:.7; }
    .tmpl-copy { background:var(--fill);               color:var(--txt2); }
    .tmpl-edit { background:rgba(10,132,255,.12);       color:#0A84FF; }
    .tmpl-del  { background:rgba(255,59,48,.12);        color:#FF3B30; }
    .add-tmpl-btn {
      width:100%; padding:13px; border-radius:12px; border:none;
      background:var(--ig-grad); color:#fff;
      font-size:15px; font-weight:700; cursor:pointer; margin-top:4px;
    }
    .add-tmpl-btn:active { opacity:.85; }

    /* ===== DRAG & DROP ===== */
    .drag-ghost {
      border-radius:14px; border:2px dashed var(--accent);
      background:rgba(225,48,108,.06); pointer-events:none;
    }
    .is-dragging {
      opacity:.45; box-shadow:0 6px 24px rgba(0,0,0,.35);
      border-radius:14px; position:relative; z-index:50;
    }

    /* ===== SORT BUTTON ===== */
    .sort-order-btn {
      padding:4px 10px; border-radius:8px; border:none;
      font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap;
      background:var(--fill); color:var(--txt2); flex-shrink:0;
    }
    .sort-order-btn:active { background:var(--sep); }

    /* ===== DM PARSE ===== */
    .dm-toggle {
      width:100%; padding:11px 14px; border-radius:10px;
      border:.5px solid var(--sep); background:var(--bg3);
      color:var(--accent); font-size:14px; font-weight:600;
      cursor:pointer; text-align:left; display:flex; align-items:center; gap:8px;
    }
    .dm-toggle:active { background:var(--fill); }
    .dm-area { margin-top:10px; display:none; }
    .dm-area.open { display:block; }
    .dm-analyze {
      width:100%; margin-top:8px; padding:11px; border-radius:10px;
      border:none; background:var(--ig-grad); color:#fff;
      font-size:14px; font-weight:700; cursor:pointer;
    }
    .dm-analyze:active { opacity:.8; }

    /* ===== PIN & PRIORITY ===== */
    .pin-btn {
      width:32px; height:44px; border:none; background:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0; border-radius:8px;
      opacity:.22; transition:opacity .15s;
    }
    .pin-btn.on { opacity:1; }
    .pin-btn:active { background:var(--fill); opacity:1; }

    .pri-btn {
      height:28px; padding:0 9px; border-radius:8px; border:none;
      font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;
      background:var(--fill); color:var(--txt3); transition:all .15s;
    }
    .pri-btn:active { opacity:.7; }
    .pri-高 { background:rgba(255,59,48,.15);  color:#FF3B30; }
    .pri-中 { background:rgba(247,119,55,.15); color:#F77737; }
    .pri-低 { background:rgba(41,182,246,.15); color:#29B6F6; }

    /* ===== FOLDER CARDS (main area) ===== */
    .folder-cards { padding:12px 14px calc(90px + var(--sb)); display:flex; flex-direction:column; gap:8px; }
    .fcard {
      background:var(--card); border-radius:14px;
      padding:14px 16px; display:flex; align-items:center; gap:12px;
      cursor:pointer; transition:transform .1s;
    }
    .fcard:active { transform:scale(.985); }
    .fcard-dot  { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .fcard-name { flex:1; font-size:16px; font-weight:600; }

    /* ===== SCHEDULE OVERLAY ===== */
    .sched-ov {
      position:fixed; inset:0; z-index:200;
      background:var(--bg); display:flex; flex-direction:column;
      padding-top:var(--st);
      transform:translateY(100%);

    .sched-hdr {

    .sched-card {

<script>
'use strict';

// =========================================================
// CONSTANTS
// =========================================================
const SK = 'ig_dm_mgr_v1';
const COLORS = ['#E1306C','#F77737','#FCAF45','#4CAF50','#26C6DA','#29B6F6','#5C6BC0','#AB47BC','#78909C','#FF5722'];
const AVATAR_COLORS = ['#E1306C','#F77737','#dc2743','#4CAF50','#29B6F6','#5C6BC0','#AB47BC','#26C6DA','#FF5722','#8D6E63'];
const DEFAULT_FOLDERS = [
  { id:'f1', name:'相互フォロー',     color:'#4CAF50', parentId:null, order:0, collapsed:true },
  { id:'f2', name:'配信関連',         color:'#29B6F6', parentId:null, order:1, collapsed:true },
  { id:'f3', name:'案件依頼（有）',   color:'#F77737', parentId:null, order:2, collapsed:true },
  { id:'f4', name:'案件依頼（悩）',   color:'#AB47BC', parentId:null, order:3, collapsed:true },
];

// =========================================================
// STATE
// =========================================================
let S = {
  folders: [],
  accounts: [],
  currentFolderId: null,
  searchQuery: '',
  sidebarOpen: false,
  editingFolderId: null,
  editingAccountId: null,
  movingAccountId: null,
  selectedColor: COLORS[0],
  sortMode: 'priority',
};

// =========================================================
// PERSISTENCE
// =========================================================
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(SK) || '{}');
    S.folders   = d.folders   || JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
    S.accounts  = d.accounts  || [];
    S.templates = d.templates || [];
  } catch {
    S.folders  = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
    S.accounts = [];
  }
}
function save() {
  localStorage.setItem(SK, JSON.stringify({ folders: S.folders, accounts: S.accounts, templates: S.templates }));
}

// =========================================================
// UTILS
// =========================================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function sanitizeUrl(url) {
  if (!url) return '';
  const u = url.trim();
  if (/^https?:\/\//i.test(u)) return u;
  if (/^[a-zA-Z0-9]/.test(u)) return 'https://' + u;
  return '';
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function folder(id)  { return S.folders.find(f => f.id === id); }
function account(id) { return S.accounts.find(a => a.id === id); }

function descendants(fid) {
  const ids = [fid];
  S.folders.filter(f => f.parentId === fid).forEach(f => ids.push(...descendants(f.id)));
  return ids;
}
function folderCount(fid) {
  const ids = descendants(fid);
  return S.accounts.filter(a => ids.includes(a.folderId)).length;
}
function folderPath(fid) {
  const f = folder(fid);
  if (!f) return '';
  return f.parentId ? folderPath(f.parentId) + ' › ' + f.name : f.name;
}
function avatarColor(username) {
  let h = 0;
  for (let i = 0; i < username.length; i++) h = username.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initial(username) {
  return (username.replace('@','').charAt(0) || '?').toUpperCase();
}
function normUser(v) {
  v = v.trim();
  if (v && !v.startsWith('@')) v = '@' + v;
  return v;
}

// =========================================================
// SIDEBAR
// =========================================================
function toggleSidebar() {
  S.sidebarOpen = !S.sidebarOpen;
  applySidebar();
}
function closeSidebar() {
  S.sidebarOpen = false;
  applySidebar();
}
function applySidebar() {
  document.getElementById('sidebar').classList.toggle('open', S.sidebarOpen);
  document.getElementById('overlay').classList.toggle('show', S.sidebarOpen);
}

// =========================================================
// FOLDER TREE
// =========================================================
function renderTree() {
  const container = document.getElementById('folderTree');
  container.innerHTML = '';
  const roots = S.folders.filter(f => !f.parentId).sort((a,b) => a.order - b.order);
  roots.forEach(f => buildFolderRow(container, f, 0));
  initFolderSortable();
}

function buildFolderRow(container, f, depth) {
  const children = S.folders.filter(c => c.parentId === f.id).sort((a,b) => a.order - b.order);
  const cnt      = folderCount(f.id);
  const active   = S.currentFolderId === f.id;

  const row = document.createElement('div');
  row.className = `f-row${depth > 0 ? ` d${depth}` : ''}${active ? ' sel' : ''}`;
  row.dataset.fid = f.id;
  row.dataset.pid = f.parentId || '';
  row.innerHTML = `
    <span class="f-dot" style="background:${esc(f.color)}"></span>
    <span class="f-name">${esc(f.name)}</span>
    <span class="f-cnt">${cnt}</span>
    <span class="f-chev${f.collapsed ? ' coll' : ''}" data-chev="${f.id}">${children.length ? '›' : ''}</span>
  `;

  // tap chevron = collapse/expand
  row.querySelector('[data-chev]').addEventListener('click', e => {
    if (!children.length) return;
    e.stopPropagation();
    f.collapsed = !f.collapsed;
    save();
    renderTree();
  });

  // tap row = 子あり→展開/折りたたみ切替 & 選択、子なし→選択のみ
  row.addEventListener('click', () => {
    if (children.length) {
      f.collapsed = !f.collapsed;
      save();
      renderTree();
    }
    selectFolder(f.id);
  });

  // long press = action sheet
  let timer;
  row.addEventListener('touchstart', () => { timer = setTimeout(() => showFolderAS(f.id), 600); }, { passive:true });
  row.addEventListener('touchend',   () => clearTimeout(timer));
  row.addEventListener('touchmove',  () => clearTimeout(timer));
  row.addEventListener('contextmenu', e => { e.preventDefault(); showFolderAS(f.id); });

  container.appendChild(row);
  if (!f.collapsed) children.forEach(c => buildFolderRow(container, c, depth + 1));
}

function selectFolder(fid) {
  S.currentFolderId = fid;
  if (window.innerWidth <= 768) closeSidebar();
  const f = folder(fid);
  document.getElementById('hdrTitle').textContent = f ? f.name : '📱 DM管理';

// MAIN AREA
// =========================================================
function renderMain() {
  const el = document.getElementById('mainArea');
  const q  = S.searchQuery;

  if (!S.currentFolderId && !q) {
    let html = infoBarHTML('すべてのアカウント', S.accounts.length);
    html += `<div class="acc-list" id="accList">` + accListHTML(S.accounts) + '</div>';
    el.innerHTML = html;
    bindCards(); bindSortBtn(el);
    document.getElementById('fab').style.display = 'none';
    return;
  }

  if (q) {
    const lq = q.toLowerCase();
    const keywords = lq.split(/\s+/).filter(Boolean);
    const accs = sortAccounts(S.accounts.filter(a => {
      const haystack = [
        a.username,
        a.memo || '',
        (a.project && a.project.tags) || '',
      ].join(' ').toLowerCase();
      return keywords.every(kw => haystack.includes(kw));
    }));
    let html = `<div class="info-bar">
      <span class="info-bar-name">検索結果</span>
      <span class="info-bar-cnt">${accs.length}件</span>
    </div><div class="acc-list" id="accList">`;
    if (!accs.length) {
      html += `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-ttl">見つかりません</div><div class="empty-sub">別のキーワードで試してください</div></div>`;
    } else {
      html += accs.map(cardHTML).join('');
    }
    html += '</div>';
    el.innerHTML = html;
    bindCards();
    return;
  }

  // フォルダーに子フォルダーがある場合はフォルダー一覧を表示
  const children = S.folders.filter(f => f.parentId === S.currentFolderId).sort((a,b) => a.order - b.order);
  if (children.length) {
    const f = folder(S.currentFolderId);
    let html = `<div class="info-bar">
      <span class="info-bar-name">${esc(f ? f.name : '')}</span>
      <span class="info-bar-cnt">${children.length}フォルダー</span>
    </div><div class="folder-cards">`;
    children.forEach(c => {
      const subCount  = S.folders.filter(x => x.parentId === c.id).length;
      const accCount  = folderCount(c.id);
      const meta = subCount ? `${subCount}フォルダー` : `${accCount}件`;
      html += `<div class="fcard" data-fid="${esc(c.id)}">
        <span class="fcard-dot" style="background:${esc(c.color)}"></span>
        <span class="fcard-name">${esc(c.name)}</span>
        <span class="fcard-meta">${meta}</span>
        <span class="fcard-chev">›</span>
      </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
    el.querySelectorAll('.fcard').forEach(card => {
      card.addEventListener('click', () => selectFolder(card.dataset.fid));
    });
    return;
  }

  // 末端フォルダー → アカウント一覧
  const folderAccs = S.accounts.filter(a => a.folderId === S.currentFolderId);
  const f          = folder(S.currentFolderId);

  let html = infoBarHTML(esc(f ? f.name : ''), folderAccs.length);
  html += `<div class="acc-list" id="accList">` + accListHTML(folderAccs) + '</div>';
  el.innerHTML = html;
  bindCards(); bindSortBtn(el);
}

function cardHTML(a) {

  const sub      = S.searchQuery
    ? esc(folderPath(a.folderId))
    : esc(projName);
  const statusBadge = (a.project && a.project.status)
    ? `<span class="status-badge s-${esc(a.project.status)}">${esc(a.project.status)}</span>` : '';
  return `
  <div class="acc-card" data-aid="${esc(a.id)}">
    <div class="acc-main">
      <button class="pin-btn${a.pinned?' on':''}" data-aid-pin="${esc(a.id)}" aria-label="ピン留め">📌</button>
      <div class="acc-avatar" style="background:${avatarColor(a.username)}">${esc(initial(a.username))}</div>
      <div class="acc-info">
        <div class="acc-user">
          <span>${esc(a.username)}</span>
          ${a.newDM ? '<span class="new-badge">NEW</span>' : ''}
          ${statusBadge}
        </div>
        ${sub ? `<div class="acc-sub">${sub}</div>` : ''}
      </div>
      <button class="pri-btn${a.priority?' pri-'+esc(a.priority):''}" data-aid-pri="${esc(a.id)}">${a.priority||'—'}</button>
      <button class="acc-more" data-aid-more="${esc(a.id)}" aria-label="案件管理">管理</button>
    </div>
    <div class="acc-detail" id="det-${esc(a.id)}">
      ${a.url ? `<div class="d-row"><span class="d-lbl">URL</span><a class="d-val d-link" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.url)}</a></div>` : ''}
      ${memo    ? `<div class="d-row"><span class="d-lbl">メモ</span><span class="d-val">${esc(memo).replace(/\n/g,'<br>')}</span></div>` : ''}
      ${S.searchQuery ? `<div class="d-row"><span class="d-lbl">フォルダー</span><span class="d-val">${esc(folderPath(a.folderId))}</span></div>` : ''}
      <div class="d-btns">
        <button class="d-btn btn-proj" style="grid-column:1/-1" data-act="proj" data-aid="${esc(a.id)}">📋 案件管理を開く</button>
        <button class="d-btn btn-edit"  data-act="edit"   data-aid="${esc(a.id)}">✏️ 編集</button>
        <button class="d-btn btn-new${a.newDM?' on':''}"  data-act="newdm"  data-aid="${esc(a.id)}">${a.newDM ? '✓ NEW ON' : '🔔 NEW DM'}</button>
        <button class="d-btn btn-move"  data-act="move"   data-aid="${esc(a.id)}">📁 移動</button>
        <button class="d-btn btn-del"   data-act="del"    data-aid="${esc(a.id)}">🗑️ 削除</button>
      </div>
    </div>
  </div>`;
}

function bindCards() {
  document.querySelectorAll('.acc-card').forEach(card => {
    const aid = card.dataset.aid;

    // tap main = toggle detail
    card.querySelector('.acc-main').addEventListener('click', () => toggleDetail(aid));

    // ピン留め
    card.querySelector('[data-aid-pin]').addEventListener('click', e => {
      e.stopPropagation();
      togglePin(aid);
    });

    // 優先度
    card.querySelector('[data-aid-pri]').addEventListener('click', e => {
      e.stopPropagation();
      cyclePriority(aid);
    });

    // 管理ボタン
    card.querySelector('[data-aid-more]').addEventListener('click', e => {
      e.stopPropagation();
      toggleDetail(aid);
    });

    // detail action buttons
    card.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const act = btn.dataset.act;
        const id  = btn.dataset.aid;
        if (act === 'edit')  openEditAcc(id);
        if (act === 'newdm') doToggleNewDM(id);
        if (act === 'move')  openMoveModal(id);
        if (act === 'del')   doDeleteAcc(id);
        if (act === 'proj')  openProjectModal(id);
      });
    });

    // long press = action sheet
    let timer;
    card.addEventListener('touchstart', () => { timer = setTimeout(() => showAccAS(aid), 650); }, { passive:true });
    card.addEventListener('touchend',   () => clearTimeout(timer));
    card.addEventListener('touchmove',  () => clearTimeout(timer));
    card.addEventListener('contextmenu', e => { e.preventDefault(); showAccAS(aid); });
  });
}

function toggleDetail(aid) {
  document.querySelectorAll('.acc-detail.open').forEach(d => {
    if (d.id !== `det-${aid}`) d.classList.remove('open');
  });
  const det = document.getElementById(`det-${aid}`);
  if (det) det.classList.toggle('open');
}

function openAddFolder(preParentId = null) {
  S.editingFolderId = null;
  document.getElementById('folderModalTtl').textContent = 'フォルダーを追加';
  document.getElementById('fldName').value = '';

  setTimeout(() => document.getElementById('fldName').focus(), 350);
}
function openEditFolder(fid) {
  const f = folder(fid);
  if (!f) return;
  S.editingFolderId = fid;
  document.getElementById('folderModalTtl').textContent = 'フォルダーを編集';
  document.getElementById('fldName').value = f.name;
  setupCpick(f.color);
  setupParentSel(f.parentId, fid);
  showModal('folderModal');
}
function setupCpick(sel) {
  S.selectedColor = sel || COLORS[0];
  const el = document.getElementById('cpick');
  el.innerHTML = '';
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = `c-opt${c === S.selectedColor ? ' sel' : ''}`;
    d.style.background = c;
    d.addEventListener('click', () => {
      el.querySelectorAll('.c-opt').forEach(o => o.classList.remove('sel'));
      d.classList.add('sel');
      S.selectedColor = c;
    });
    el.appendChild(d);
  });
}
function setupParentSel(selectedPid, excludeFid) {
  const sel = document.getElementById('parentSel');
  sel.innerHTML = '<option value="">なし（ルート）</option>';
  function addOpts(pid, depth) {
    S.folders
      .filter(f => f.parentId === pid && f.id !== excludeFid)
      .sort((a,b) => a.order - b.order)
      .forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = '　'.repeat(depth) + f.name;
        if (f.id === selectedPid) opt.selected = true;
        sel.appendChild(opt);
        addOpts(f.id, depth + 1);
      });
  }
  addOpts(null, 0);
}
function saveFolder() {
  const name = document.getElementById('fldName').value.trim();
  if (!name) { toast('フォルダー名を入力してください'); return; }
  const color    = S.selectedColor;
  const parentId = document.getElementById('parentSel').value || null;

  if (S.editingFolderId) {
    const f = folder(S.editingFolderId);
    if (f) { f.name = name; f.color = color; f.parentId = parentId; }
    save(); renderTree(); renderMain();
    toast('フォルダーを更新しました');
  } else {
    const maxOrd = S.folders.reduce((m,f) => Math.max(m, f.order||0), -1);
    S.folders.push({ id:uid(), name, color, parentId, order:maxOrd+1, collapsed:true });
    if (parentId) { const p = folder(parentId); if (p) p.collapsed = false; }
    save(); renderTree();
    toast('フォルダーを追加しました');
  }
  hideModal('folderModal');
}
function doDeleteFolder(fid) {
  const f = folder(fid);
  if (!f) return;
  const ids = descendants(fid);
  const cnt = S.accounts.filter(a => ids.includes(a.folderId)).length;
  const msg = cnt > 0
    ? `「${f.name}」を削除しますか？\n含まれる${cnt}件のアカウントも削除されます。`
    : `「${f.name}」を削除しますか？`;
  if (!confirm(msg)) return;

  S.accounts = S.accounts.filter(a => !ids.includes(a.folderId));
  S.folders  = S.folders.filter(f => !ids.includes(f.id));
  if (S.currentFolderId && ids.includes(S.currentFolderId)) {
    S.currentFolderId = null;
    document.getElementById('hdrTitle').textContent = '📱 DM管理';
    document.getElementById('fab').style.display = 'none';
  }
  save(); renderTree(); renderMain();
  toast('フォルダーを削除しました');
}

// =========================================================
// SORTABLE (touch + mouse)
// =========================================================
const _ds = { el:null, ghost:null, timer:null, startY:0, getSibs:null, idKey:null, groupKey:null, cb:null };

document.addEventListener('mousemove', e => {
  if (!_ds.el) return;
  _doMove(e.clientY);
});
document.addEventListener('mouseup', () => {
  if (!_ds.el) return;
  _doEnd();
});

function _doMove(y) {
  const sibs = _ds.getSibs(_ds.el).filter(x => x !== _ds.el);
  let before = null;
  for (const s of sibs) {
    const r = s.getBoundingClientRect();
    if (y < r.top + r.height / 2) { before = s; break; }
  }
  if (before) before.before(_ds.ghost);
  else {
    const last = sibs[sibs.length - 1];
    if (last) last.after(_ds.ghost); else _ds.ghost.parentNode?.appendChild(_ds.ghost);
  }
}

function _doEnd() {
  clearTimeout(_ds.timer);
  if (!_ds.el) return;
  _ds.ghost.replaceWith(_ds.el);
  _ds.el.classList.remove('is-dragging');
  const newIds = _ds.getSibs(_ds.el).map(x => x.dataset[_ds.idKey]);
  const grp    = _ds.groupKey ? _ds.el.dataset[_ds.groupKey] : null;
  const cb     = _ds.cb;
  _ds.el = null; _ds.ghost = null;
  cb(newIds, grp);
}

function _doCancel() {
  clearTimeout(_ds.timer);
  if (_ds.el) {
    _ds.ghost?.remove();
    _ds.el.classList.remove('is-dragging');
    _ds.el = null; _ds.ghost = null;
  }
}

function _activateDrag(el) {
  _ds.el = el;
  el.classList.add('is-dragging');
  if (navigator.vibrate) navigator.vibrate(40);
  _ds.ghost = document.createElement('div');
  _ds.ghost.className = 'drag-ghost';
  _ds.ghost.style.height = el.offsetHeight + 'px';
  _ds.ghost.style.marginBottom = getComputedStyle(el).marginBottom || '0px';
  el.after(_ds.ghost);
}

function makeSortable(container, selector, idKey, onReorder, groupKey) {
  _ds.idKey    = idKey;
  _ds.groupKey = groupKey || null;
  _ds.cb       = onReorder;
  _ds.getSibs  = el => {
    const all = [...container.querySelectorAll(selector)];
    if (!groupKey) return all;
    const g = el.dataset[groupKey];
    return all.filter(x => x.dataset[groupKey] === g);
  };

  container.querySelectorAll(selector).forEach(el => {
    // Mouse
    el.addEventListener('mousedown', e => {
      _ds.startY = e.clientY;
      _ds.timer = setTimeout(() => _activateDrag(el), 480);
    });

    // Touch
    el.addEventListener('touchstart', e => {
      _ds.startY = e.touches[0].clientY;
      _ds.timer = setTimeout(() => _activateDrag(el), 480);
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!_ds.el) {
        if (Math.abs(e.touches[0].clientY - _ds.startY) > 10) clearTimeout(_ds.timer);
        return;
      }
      e.preventDefault();
      _doMove(e.touches[0].clientY);
    }, { passive: false });

    el.addEventListener('touchend',    _doEnd);
    el.addEventListener('touchcancel', _doCancel);
  });
}

function initFolderSortable() {
  const container = document.getElementById('folderTree');
  if (!container) return;

// =========================================================
// SORT
// =========================================================
const SORT_TABS = [
  { key:'priority', label:'優先度順'   },
  { key:'status',   label:'ステータス' },
  { key:'shoot',    label:'撮影日順'   },
  { key:'deadline', label:'締め切り順' },
  { key:'newest',   label:'新着順'     },
];
const STATUS_GRP_ORDER = ['相談中','保留中','決定済み','終了'];

function applySortMode(accs) {
  switch (S.sortMode) {
    case 'newest':
      return [...accs].sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    case 'shoot':
      return [...accs].sort((a,b) => {
        const da = a.project?.shootDate ? new Date(a.project.shootDate) : null;
        const db = b.project?.shootDate ? new Date(b.project.shootDate) : null;
        if (!da && !db) return 0; if (!da) return 1; if (!db) return -1;
        return da - db;
      });
    case 'deadline':
      return [...accs].sort((a,b) => {
        const da = a.project?.deadline ? new Date(a.project.deadline) : null;
        const db = b.project?.deadline ? new Date(b.project.deadline) : null;
        if (!da && !db) return 0; if (!da) return 1; if (!db) return -1;
        return da - db;
      });
    case 'status':
      return [...accs].sort((a,b) => {
        const oa = STATUS_GRP_ORDER.indexOf(a.project?.status ?? '');
        const ob = STATUS_GRP_ORDER.indexOf(b.project?.status ?? '');
        const ra = oa === -1 ? STATUS_GRP_ORDER.length : oa;
        const rb = ob === -1 ? STATUS_GRP_ORDER.length : ob;
        if (ra !== rb) return ra - rb;
        return (b.createdAt||0) - (a.createdAt||0);
      });
    default: // priority
      return sortAccounts(accs);
  }
}

function currentSortLabel() {
  return SORT_TABS.find(t => t.key === S.sortMode)?.label || '表示順';
}

function showSortPicker() {
  showAS('表示順を選択', SORT_TABS.map(t => ({
    label: (S.sortMode === t.key ? '✓ ' : '　') + t.label,
    fn: () => { S.sortMode = t.key; renderMain(); },
  })));
}

}

function accListHTML(accs) {
  const sorted = applySortMode(accs);
  if (!sorted.length) {
    return '<div class="empty"><div class="empty-ico">👤</div><div class="empty-ttl">アカウントがありません</div><div class="empty-sub">右下の ＋ で追加できます</div></div>';
  }
  if (S.sortMode === 'status') {
    let h = '';
    const groups = {};
    sorted.forEach(a => { const s = a.project?.status||'未設定'; (groups[s]=groups[s]||[]).push(a); });
    [...STATUS_GRP_ORDER, '未設定'].forEach(s => {
      if (groups[s]?.length) h += `<div class="sec-hdr">${s}</div>` + groups[s].map(cardHTML).join('');
    });
    return h;
  }
  return sorted.map(cardHTML).join('');
}

// =========================================================
// URL AUTO-FILL & DM TEXT ANALYSIS
// =========================================================
function parseUsernameFromUrl(url) {
  url = url.trim();
  const ig = url.match(/instagram\.com\/([A-Za-z0-9_.]+)\/?(?:[?#]|$)/);
  if (ig && !['p','reel','reels','stories','explore','accounts'].includes(ig[1]))
    return '@' + ig[1];
  const tt = url.match(/tiktok\.com\/@?([A-Za-z0-9_.]+)\/?(?:[?#]|$)/);
  if (tt && !['video','trending','foryou'].includes(tt[1]))
    return '@' + tt[1];
  return null;
}

function analyzeDMText(text) {
  const result = { username: null, url: null, memo: '' };

  // @username
  const um = text.match(/@([\w.]+)/);
  if (um) result.username = '@' + um[1];

  // URL
  const urlm = text.match(/https?:\/\/(?:www\.)?(?:instagram\.com|tiktok\.com)\/[\w.@/%?=&#-]+/);
  if (urlm) result.url = urlm[0];

  // キーワードにマッチする行をメモへ
  const KWS = [
    '料理','食事','飲食','提供','ご飯','ランチ','ディナー',
    '報酬','ギャラ','謝礼','円','万','お支払い',
    '人数','名様','名募集','人募集','定員',
    '投稿','インスタ','Instagram','TikTok','ティックトック','リール','ストーリー','YouTube','ブログ',
    '撮影','取材','写真','動画','フォト',
    '締め切り','期限','日まで','月','スケジュール',
    '条件','詳細','ご連絡','よろしく','お願い',
  ];
  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const matched = lines.filter(l => KWS.some(kw => l.includes(kw)));
  result.memo = [...new Set(matched)].join('\n');
  return result;
}

function initUrlAutoFill() {
  document.getElementById('accUrl').addEventListener('input', function() {
    const username = parseUsernameFromUrl(this.value);
    if (username) {
      const f = document.getElementById('accUser');
      if (!f.value) { f.value = username; toast('アカウント名を自動入力しました'); }
    }
  });
}

function initDMAnalyze() {
  const toggle = document.getElementById('dmToggle');
  const area   = document.getElementById('dmArea');

  toggle.addEventListener('click', () => {
    area.classList.toggle('open');
    toggle.textContent = area.classList.contains('open')
      ? '📋 DMテキストから自動入力 ▲'
      : '📋 DMテキストから自動入力';
  });

  document.getElementById('dmAnalyzeBtn').addEventListener('click', () => {
    const text = document.getElementById('dmText').value;
    if (!text.trim()) { toast('テキストを貼り付けてください'); return; }
    const r = analyzeDMText(text);
    const filled = [];

    if (r.username) {
      const f = document.getElementById('accUser');
      if (!f.value) { f.value = r.username; filled.push('アカウント名'); }
    }
    if (r.url) {
      const f = document.getElementById('accUrl');
      if (!f.value) { f.value = r.url; filled.push('URL'); }
    }
    if (r.memo) {
      const f = document.getElementById('accMemo');
      f.value = f.value ? f.value + '\n\n' + r.memo : r.memo;
      filled.push('メモ');
    }

    if (filled.length) {
      toast(filled.join('・') + 'を自動入力しました');
      area.classList.remove('open');
      toggle.textContent = '📋 DMテキストから自動入力';
      document.getElementById('dmText').value = '';
    } else {
      toast('抽出できる情報が見つかりませんでした');
    }
  });
}

// =========================================================
// PIN & PRIORITY
// =========================================================
const PRI_CYCLE = [null, '高', '中', '低'];
const PRI_ORDER = { '高':0, '中':1, '低':2 };

function togglePin(aid) {
  const a = account(aid);
  if (!a) return;
  a.pinned = !a.pinned;
  save(); renderMain();
  toast(a.pinned ? 'ピン留めしました' : 'ピン留めを解除しました');
}

function cyclePriority(aid) {
  const a = account(aid);
  if (!a) return;
  const i = PRI_CYCLE.indexOf(a.priority ?? null);
  a.priority = PRI_CYCLE[(i + 1) % PRI_CYCLE.length];
  save(); renderMain();
}

function sortAccounts(accs) {
  return [...accs].sort((a, b) => {
    if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
    const pa = PRI_ORDER[a.priority] ?? 3;
    const pb = PRI_ORDER[b.priority] ?? 3;
    if (pa !== pb) return pa - pb;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
}

const STATUS_CFG = {
  '相談中':  { c:'#29B6F6', bg:'rgba(41,182,246,.15)'  },
  '決定済み': { c:'#4CAF50', bg:'rgba(76,175,80,.15)'   },
  '保留中':  { c:'#F77737', bg:'rgba(247,119,55,.15)'  },
  '終了':    { c:'#78909C', bg:'rgba(120,144,156,.18)' },
};
let projAccountId = null;
let projStatus    = null;

function openProjectModal(aid) {
  projAccountId = aid;

function renderProjStatus() {
  document.querySelectorAll('.st-btn').forEach(btn => {
    const s   = btn.dataset.st;
    const cfg = STATUS_CFG[s];
    const on  = s === projStatus;

    btn.style.setProperty('--c',   on ? cfg.c  : '');

    btn.style.background  = on ? cfg.bg : '';

function saveProject() {

function copyField(inputId) {
  const el = document.getElementById(inputId);
  let val = el.value;
  if (!val) { toast('コピーする内容がありません'); return; }
  if (el.type === 'datetime-local') {
    const d = new Date(val);
    if (!isNaN(d)) val = d.toLocaleString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }
  navigator.clipboard.writeText(val).then(() => toast('コピーしました')).catch(() => toast('コピーに失敗しました'));
}

// =========================================================
// SCHEDULE
// =========================================================
function openSchedule() {
  renderSchedule();
  document.getElementById('schedOv').classList.add('show');
}
function closeSchedule() {
  document.getElementById('schedOv').classList.remove('show');
}

function renderSchedule() {
  const list = document.getElementById('schedList');
  const items = [];
  S.accounts.forEach(a => {
    if (!a.project || a.project.status === '終了') return;
    if (a.project.shootDate) items.push({ d: new Date(a.project.shootDate), kind:'shoot', a });
    if (a.project.deadline)  items.push({ d: new Date(a.project.deadline),  kind:'dl',    a });
  });
  items.sort((x, y) => x.d - y.d);

  if (!items.length) {
    list.innerHTML = `<div class="sched-empty">
      <div style="font-size:48px">📅</div>
      <div style="font-size:17px;font-weight:600;color:var(--txt2)">スケジュールなし</div>
      <div style="font-size:14px">案件の撮影日時・締め切りを<br>登録するとここに表示されます</div>
    </div>`;
    return;
  }

  const DOW = ['日','月','火','水','木','金','土'];
  let html = '';
  let curMonth = '';
  items.forEach(item => {
    const d  = item.d;
    const mo = `${d.getFullYear()}年${d.getMonth()+1}月`;
    if (mo !== curMonth) { html += `<div class="sched-month">${mo}</div>`; curMonth = mo; }
    const hm  = d.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
    const p   = item.a.project;
    const pn  = p.name || item.a.username;
    const kl  = item.kind === 'shoot' ? '📷 撮影' : '⏰ 締め切り';
    const kc  = item.kind === 'shoot' ? 'shoot' : 'dl';
    html += `<div class="sched-card" data-aid="${esc(item.a.id)}">
      <div class="sched-cal">
        <div class="sched-cal-m">${d.getMonth()+1}月</div>
        <div class="sched-cal-d">${d.getDate()}</div>
        <div class="sched-cal-w">${DOW[d.getDay()]}</div>
      </div>
      <div class="sched-vl"></div>
      <div class="sched-body">
        <div class="sched-kind ${kc}">${kl}</div>
        <div class="sched-pname">${esc(pn)}</div>
        <div class="sched-user">${esc(item.a.username)}</div>
      </div>
      <div class="sched-hm">${hm}</div>
    </div>`;
  });
  list.innerHTML = html;

  list.querySelectorAll('.sched-card').forEach(card => {
    card.addEventListener('click', () => {
      const a = account(card.dataset.aid);
      if (!a) return;
      closeSchedule();
      selectFolder(a.folderId);
      setTimeout(() => {
        const el = document.querySelector(`[data-aid="${a.id}"]`);
        if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); toggleDetail(a.id); }
      }, 350);
    });
  });
}

  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
